<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Split — bill splitter</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F1;
    --paper-dim:#F2EEE3;
    --ink:#20241F;
    --ink-soft:#666B60;
    --ink-faint:#9A9E92;
    --accent:#1C6B63;
    --accent-ink:#0E3F3A;
    --accent-soft:#DEEEEB;
    --line:#DAD3BF;
    --danger:#B3261E;
    --danger-soft:#F7E3E1;
    --radius:14px;
    --shadow:0 1px 2px rgba(32,36,31,0.06), 0 1px 1px rgba(32,36,31,0.04);
    --font-display:'Space Mono', monospace;
    --font-body:'Manrope', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;
    justify-content:center;
  }
  #app{
    width:100%;
    max-width:480px;
    min-height:100vh;
    min-height:100dvh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:0 0 40px rgba(0,0,0,0.06);
  }

  /* ---------- Header / ticket strip ---------- */
  header.ticket{
    padding:16px 20px 0 20px;
    border-bottom:1px dashed var(--line);
  }
  .steps{
    display:flex;
    gap:6px;
    padding-bottom:14px;
  }
  .step-tab{
    flex:1;
    text-align:center;
    font-family:var(--font-display);
    font-size:10.5px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color:var(--ink-faint);
    padding:6px 2px 10px 2px;
    border-bottom:3px solid var(--line);
    transition:all .2s ease;
    cursor:pointer;
    background:none;
  }
  .step-tab.active{
    color:var(--accent-ink);
    border-bottom-color:var(--accent);
    font-weight:700;
  }
  .step-tab.done{
    color:var(--ink-soft);
    border-bottom-color:var(--ink-faint);
  }

  /* ---------- Main content ---------- */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .screen{
    display:none;
    flex:1;
    flex-direction:column;
    overflow:hidden;
  }
  .screen.active{display:flex;}

  .scroll{
    flex:1;
    overflow-y:auto;
    padding:16px 20px;
  }

  /* ---------- Footer / action bar ---------- */
  footer.actions{
    padding:14px 20px calc(16px + env(safe-area-inset-bottom));
    border-top:1px dashed var(--line);
    display:flex;
    gap:10px;
    background:var(--paper);
  }
  button{
    font-family:var(--font-body);
    cursor:pointer;
    border:none;
    outline:none;
  }
  .btn{
    flex:1;
    padding:13px 16px;
    border-radius:var(--radius);
    font-size:15px;
    font-weight:700;
    transition:transform .08s ease, opacity .15s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:disabled{background:var(--ink-faint); cursor:not-allowed;}
  .btn-ghost{background:var(--paper-dim); color:var(--ink);}
  .btn-danger{background:var(--danger-soft); color:var(--danger);}
  .btn-small{flex:none; padding:9px 14px; font-size:13px; border-radius:10px;}

  /* ---------- Screen 1: people ---------- */
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .add-row input{
    flex:1;
    padding:12px 14px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:#fff;
    font-size:15px;
    font-family:var(--font-body);
    color:var(--ink);
  }
  .add-row input:focus{border-color:var(--accent);}
  .icon-btn{
    width:46px;
    border-radius:var(--radius);
    background:var(--accent);
    color:#fff;
    font-size:20px;
    font-weight:700;
    line-height:1;
  }

  .person-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:11px 4px;
    border-bottom:1px solid var(--paper-dim);
  }
  .swatch{
    width:38px;height:38px;
    min-width:38px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    color:#fff;
  }
  .person-row .pname{flex:1; font-size:15.5px; font-weight:500;}
  .remove-x{
    background:none;
    color:var(--ink-faint);
    font-size:18px;
    width:30px;height:30px;
    border-radius:8px;
  }
  .remove-x:hover{background:var(--paper-dim); color:var(--danger);}
  .empty-hint{
    color:var(--ink-faint);
    font-size:14px;
    padding:24px 4px;
    text-align:center;
    line-height:1.5;
  }

  /* ---------- Screen 2: bill items ---------- */
  .sticky-total{
    padding:16px 20px 0 20px;
    flex-shrink:0;
  }
  .total-strip{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;
    background:var(--accent-soft);
    border-radius:var(--radius);
    margin-bottom:16px;
  }
  .total-strip .label{font-size:12.5px; text-transform:uppercase; letter-spacing:1px; color:var(--accent-ink); font-weight:700;}
  .total-strip .amount{font-family:var(--font-display); font-size:22px; font-weight:700; color:var(--accent-ink);}
  .amount-group{display:flex; align-items:center; gap:7px;}
  .currency-select-inline{
    font-family:var(--font-display);
    font-size:16px;
    font-weight:700;
    color:var(--accent-ink);
    background:#fff;
    border:1px solid var(--line);
    border-radius:7px;
    padding:3px 4px;
    width:auto;
  }

  .item-row{
    display:flex;
    gap:8px;
    align-items:center;
    padding:8px 0;
  }
  .item-row input.item-name{
    flex:1;
    min-width:0;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    font-size:14.5px;
    font-family:var(--font-body);
  }
  .price-wrap{
    position:relative;
  }
  .price-wrap span{
    position:absolute;
    left:11px; top:50%; transform:translateY(-50%);
    color:var(--ink-faint);
    font-family:var(--font-display);
    font-size:14px;
  }
  .item-row .price-wrap{
    width:106px;
  }
  input.item-price{
    width:100%;
    padding:11px 10px 11px 24px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#fff;
    font-size:14.5px;
    font-family:var(--font-display);
    text-align:right;
  }
  .item-row input:focus, .addon-field input:focus{border-color:var(--accent);}

  .line-btn-row{
    display:flex;
    gap:8px;
    margin-top:6px;
  }
  .line-btn-row .btn{flex:1;}
  .scan-status{
    display:none;
    font-size:13px;
    color:var(--accent-ink);
    background:var(--accent-soft);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:12px;
    line-height:1.5;
  }
  .scan-status.error{
    color:var(--danger);
    background:var(--danger-soft);
  }
  .addon-fields{
    display:flex;
    gap:20px;
    margin-top:16px;
  }
  .addon-field{
    flex:1;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .addon-field label{
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--ink-soft);
    font-weight:700;
    white-space:nowrap;
  }
  .addon-field .price-wrap{
    flex:1;
  }

  /* ---------- Screen 3: apportion ---------- */
  .bill-line{
    border:2px solid transparent;
    background:#fff;
    border-radius:var(--radius);
    padding:12px 14px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
    transition:border-color .12s ease;
  }
  .bill-line.selected{
    border-color:var(--accent);
  }
  .bill-line .top-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:9px;
  }
  .bill-line .iname{font-size:15px; font-weight:700;}
  .bill-line .iprice{font-family:var(--font-display); font-size:15px; color:var(--ink-soft);}
  .bar{
    height:16px;
    border-radius:8px;
    background:repeating-linear-gradient(45deg, var(--paper-dim), var(--paper-dim) 5px, #EFEAD9 5px, #EFEAD9 10px);
    display:flex;
    overflow:hidden;
  }
  .bar .seg{
    height:100%;
  }
  .breakdown-row{
    display:flex;
    margin-top:7px;
    min-height:14px;
  }
  .breakdown-row .bseg{
    font-family:var(--font-display);
    font-size:10.5px;
    color:var(--ink-soft);
    letter-spacing:0.2px;
    text-align:center;
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
    padding:0 2px;
  }

  .party-dock{
    padding:12px 20px 4px 20px;
    border-top:1px dashed var(--line);
  }
  .party-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:12px;
  }
  .party-btn{
    width:52px;height:52px;
    border-radius:50%;
    color:#fff;
    font-family:var(--font-display);
    font-weight:700;
    font-size:13px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);
    position:relative;
  }
  .party-btn:active{transform:scale(0.92);}
  .party-btn .count-badge{
    position:absolute;
    top:-4px; right:-4px;
    background:var(--ink);
    color:#fff;
    border-radius:50%;
    min-width:18px; height:18px;
    font-size:10px;
    display:flex;align-items:center;justify-content:center;
    padding:0 3px;
  }
  .dock-actions{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:10px;
  }

  /* ---------- Screen 4: summary ---------- */
  .summary-row{
    display:flex;
    align-items:center;
    gap:12px;
    padding:13px 4px;
    border-bottom:1px solid var(--paper-dim);
  }
  .summary-row .pname{flex:1; font-size:15.5px; font-weight:600;}
  .summary-row .pamount{font-family:var(--font-display); font-size:17px; font-weight:700;}
  .grand-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:16px;
    padding-top:14px;
    border-top:2px solid var(--ink);
  }
  .grand-row .glabel{font-size:13px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
  .grand-row .gamount{font-family:var(--font-display); font-size:24px; font-weight:700;}
  .addon-summary-line{
    font-size:12.5px;
    color:var(--ink-soft);
    text-align:right;
    margin-top:14px;
    font-style:italic;
  }
  .warn-banner{
    background:var(--danger-soft);
    color:var(--danger);
    border-radius:10px;
    padding:11px 13px;
    font-size:13px;
    margin-bottom:14px;
    line-height:1.5;
  }
  .warn-banner b{display:block; margin-bottom:6px;}
  .warn-item{font-weight:700; line-height:1.4;}
  .warn-msg{margin-top:8px; font-weight:400; line-height:1.5;}

  ::-webkit-scrollbar{width:0px;}
</style>
</head>
<body>
<div id="app">

  <header class="ticket">
    <div class="steps" id="stepTabs">
      <div class="step-tab" data-step="1">1 · Who</div>
      <div class="step-tab" data-step="2">2 · Bill</div>
      <div class="step-tab" data-step="3">3 · Split</div>
      <div class="step-tab" data-step="4">4 · Total</div>
    </div>
  </header>

  <main>

    <!-- SCREEN 1: PEOPLE -->
    <section class="screen" id="screen1">
      <div class="scroll">
        <div class="add-row">
          <input type="text" id="nameInput" placeholder="Add a name…" maxlength="30" autocomplete="off">
          <button class="icon-btn" id="addPersonBtn">+</button>
        </div>
        <div id="peopleList"></div>
      </div>
      <footer class="actions">
        <button class="btn btn-primary" id="toStep2" disabled>Next</button>
      </footer>
    </section>

    <!-- SCREEN 2: BILL ITEMS -->
    <section class="screen" id="screen2">
      <div class="sticky-total">
        <div class="total-strip">
          <div class="label">Grand total</div>
          <div class="amount-group">
            <select id="currencySelect" class="currency-select-inline" aria-label="Currency">
              <option value="€">€</option>
              <option value="£">£</option>
              <option value="$">$</option>
              <option value="none">—</option>
            </select>
            <div class="amount" id="billTotal">0.00</div>
          </div>
        </div>
      </div>
      <div class="scroll">
        <div id="scanStatus" class="scan-status"></div>
        <div id="itemsList"></div>
        <div class="line-btn-row">
          <button class="btn btn-ghost" id="addLineBtn">+ Add line</button>
          <button class="btn btn-ghost" id="scanReceiptBtn">📷 Scan receipt</button>
        </div>
        <input type="file" accept="image/*" capture="environment" id="receiptPhotoInput" style="display:none">

        <div class="addon-fields">
          <div class="addon-field">
            <label for="taxInput">Tax</label>
            <div class="price-wrap">
              <span id="taxSym">€</span>
              <input type="number" class="item-price" id="taxInput" step="0.01" min="0" placeholder="0.00">
            </div>
          </div>
          <div class="addon-field">
            <label for="tipInput">Tip</label>
            <div class="price-wrap">
              <span id="tipSym">€</span>
              <input type="number" class="item-price" id="tipInput" step="0.01" min="0" placeholder="0.00">
            </div>
          </div>
        </div>
      </div>
      <footer class="actions">
        <button class="btn btn-ghost" id="backTo1">Back</button>
        <button class="btn btn-primary" id="toStep3">Next</button>
      </footer>
    </section>

    <!-- SCREEN 3: APPORTION -->
    <section class="screen" id="screen3">
      <div class="scroll" id="apportionList"></div>
      <div class="party-dock">
        <div class="party-row" id="partyDock"></div>
        <div class="dock-actions">
          <button class="btn btn-danger btn-small" id="clearLineBtn">Clear line</button>
        </div>
      </div>
      <footer class="actions">
        <button class="btn btn-ghost" id="backTo2">Back</button>
        <button class="btn btn-primary" id="toStep4">Next</button>
      </footer>
    </section>

    <!-- SCREEN 4: SUMMARY -->
    <section class="screen" id="screen4">
      <div class="scroll">
        <div id="warnArea"></div>
        <div id="summaryList"></div>
        <div class="grand-row">
          <div class="glabel">Grand total</div>
          <div class="gamount" id="summaryGrandTotal">€0.00</div>
        </div>
      </div>
      <footer class="actions">
        <button class="btn btn-ghost" id="backTo3">Back</button>
        <button class="btn btn-danger" id="newBillBtn">New bill</button>
      </footer>
    </section>

  </main>
</div>

<script>
(function(){
  "use strict";

  var PALETTE = [
    '#E0483E', '#2F6FED', '#D6A419', // primary: red, blue, yellow
    '#3F9142', '#8452C9', '#DD6B20', // secondary: green, purple, orange
    '#D6478E', '#1FA7B3', '#8A7F4A',
    '#B93B6C', '#2F8F82', '#5860C9'
  ];

  // Colour is derived from a person's current position in the list, not stored,
  // so that when someone is deleted everyone after them shifts up a colour too.
  function colorForIndex(idx){
    return PALETTE[idx % PALETTE.length];
  }
  function colorForPersonId(id){
    var idx = state.people.findIndex(function(p){ return p.id === id; });
    return idx >= 0 ? colorForIndex(idx) : '#999999';
  }

  var STORAGE_KEY = 'billSplitState_v1';

  var defaultState = {
    step: 1,
    people: [],      // {id, name, abbr}
    items: [],       // {id, name, price}
    shares: {},       // itemId -> { personId: count }
    selectedItemId: null,
    nextPersonId: 1,
    nextItemId: 1,
    currency: '€',   // '€' | '£' | '$' | 'none'
    tax: 0,
    tip: 0
  };

  var state = loadState();

  function loadState(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        var parsed = JSON.parse(raw);
        return Object.assign({}, defaultState, parsed);
      }
    }catch(e){}
    return JSON.parse(JSON.stringify(defaultState));
  }

  function saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
  }

  // ---------- Abbreviation logic ----------
  function computeAbbreviations(people){
    var n = people.length;
    var lengths = new Array(n).fill(1);
    var finalized = new Array(n).fill(false);

    for(var L = 1; L <= 3; L++){
      var groups = {};
      for(var i = 0; i < n; i++){
        if(finalized[i]) continue;
        var name = people[i].name || '';
        var prefix = name.substring(0, L).toLowerCase();
        if(!groups[prefix]) groups[prefix] = [];
        groups[prefix].push(i);
      }
      Object.keys(groups).forEach(function(prefix){
        var idxs = groups[prefix];
        if(idxs.length === 1){
          var idx = idxs[0];
          lengths[idx] = Math.min(L, Math.max(1, (people[idx].name || '').length));
          finalized[idx] = true;
        } else if(L === 3){
          // give up differentiating further; lock at 3 (may still collide, acceptable edge case)
          idxs.forEach(function(idx){
            lengths[idx] = Math.min(3, Math.max(1, (people[idx].name || '').length));
            finalized[idx] = true;
          });
        }
      });
    }

    return people.map(function(p, i){
      var name = p.name || '';
      var len = lengths[i] || 1;
      var raw = name.substring(0, len);
      // capitalize first letter, keep rest as typed-case
      return raw.charAt(0).toUpperCase() + raw.slice(1);
    });
  }

  function refreshAbbreviations(){
    var abbrs = computeAbbreviations(state.people);
    state.people.forEach(function(p, i){ p.abbr = abbrs[i]; });
  }

  // ---------- Rendering: step tabs ----------
  function renderStepTabs(){
    document.querySelectorAll('.step-tab').forEach(function(tab){
      var s = parseInt(tab.dataset.step, 10);
      tab.classList.remove('active','done');
      if(s === state.step) tab.classList.add('active');
      else if(s < state.step) tab.classList.add('done');
    });
    document.querySelectorAll('.screen').forEach(function(scr){ scr.classList.remove('active'); });
    document.getElementById('screen' + state.step).classList.add('active');
  }

  // ---------- Screen 1: People ----------
  var nameInput = document.getElementById('nameInput');
  var addPersonBtn = document.getElementById('addPersonBtn');
  var peopleList = document.getElementById('peopleList');
  var toStep2Btn = document.getElementById('toStep2');

  function addPerson(){
    var val = nameInput.value.trim();
    if(!val) return;
    state.people.push({ id: state.nextPersonId++, name: val, abbr: '' });
    nameInput.value = '';
    refreshAbbreviations();
    renderPeople();
    saveState();
    nameInput.focus();
  }

  function removePerson(id){
    state.people = state.people.filter(function(p){ return p.id !== id; });
    // also clean up shares referencing this person
    Object.keys(state.shares).forEach(function(itemId){
      if(state.shares[itemId] && state.shares[itemId][id] !== undefined){
        delete state.shares[itemId][id];
      }
    });
    refreshAbbreviations();
    renderPeople();
    saveState();
  }

  function renderPeople(){
    peopleList.innerHTML = '';
    if(state.people.length === 0){
      var hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'Add everyone who\'s splitting this bill. Each person gets a colour and a short tag.';
      peopleList.appendChild(hint);
    }
    state.people.forEach(function(p, idx){
      var row = document.createElement('div');
      row.className = 'person-row';

      var sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = colorForIndex(idx);
      sw.textContent = p.abbr;

      var name = document.createElement('div');
      name.className = 'pname';
      name.textContent = p.name;

      var rem = document.createElement('button');
      rem.className = 'remove-x';
      rem.textContent = '×';
      rem.addEventListener('click', function(){ removePerson(p.id); });

      row.appendChild(sw);
      row.appendChild(name);
      row.appendChild(rem);
      peopleList.appendChild(row);
    });
    toStep2Btn.disabled = state.people.length < 2;
  }

  addPersonBtn.addEventListener('click', addPerson);
  nameInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); addPerson(); }
  });

  // ---------- Screen 2: Bill items ----------
  var itemsList = document.getElementById('itemsList');
  var addLineBtn = document.getElementById('addLineBtn');
  var billTotalEl = document.getElementById('billTotal');

  function fmt(n){
    var sym = (state.currency && state.currency !== 'none') ? state.currency : '';
    var num = (Math.round((n + Number.EPSILON) * 100) / 100).toFixed(2);
    return sym + num;
  }

  function addItem(focus){
    state.items.push({ id: state.nextItemId++, name: '', price: 0 });
    renderItems();
    saveState();
    if(focus){
      var inputs = itemsList.querySelectorAll('.item-name');
      var last = inputs[inputs.length - 1];
      if(last) last.focus();
    }
  }

  function removeItem(id){
    state.items = state.items.filter(function(it){ return it.id !== id; });
    delete state.shares[id];
    if(state.selectedItemId === id) state.selectedItemId = null;
    renderItems();
    saveState();
  }

  function renderItems(){
    itemsList.innerHTML = '';
    state.items.forEach(function(it){
      var row = document.createElement('div');
      row.className = 'item-row';

      var nameInp = document.createElement('input');
      nameInp.className = 'item-name';
      nameInp.type = 'text';
      nameInp.placeholder = 'Item';
      nameInp.value = it.name;
      nameInp.addEventListener('input', function(){
        it.name = nameInp.value;
        saveState();
        renderApportionList();
      });
      nameInp.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ e.preventDefault(); priceInp.focus(); priceInp.select(); }
      });

      var priceWrap = document.createElement('div');
      priceWrap.className = 'price-wrap';
      var sym = document.createElement('span');
      sym.textContent = (state.currency && state.currency !== 'none') ? state.currency : '';
      var priceInp = document.createElement('input');
      priceInp.className = 'item-price';
      priceInp.type = 'number';
      priceInp.step = '0.01';
      priceInp.min = '0';
      priceInp.placeholder = '0.00';
      priceInp.value = it.price ? it.price : '';
      priceInp.addEventListener('input', function(){
        it.price = parseFloat(priceInp.value) || 0;
        updateBillTotal();
        saveState();
        renderApportionList();
      });
      priceInp.addEventListener('keydown', function(e){
        if(e.key === 'Enter'){ e.preventDefault(); addItem(true); }
      });
      priceWrap.appendChild(sym);
      priceWrap.appendChild(priceInp);

      var rem = document.createElement('button');
      rem.className = 'remove-x';
      rem.textContent = '×';
      rem.addEventListener('click', function(){ removeItem(it.id); });

      row.appendChild(nameInp);
      row.appendChild(priceWrap);
      row.appendChild(rem);
      itemsList.appendChild(row);
    });
    updateBillTotal();
  }

  function updateBillTotal(){
    var itemsTotal = state.items.reduce(function(sum, it){ return sum + (it.price || 0); }, 0);
    var total = itemsTotal + (state.tax || 0) + (state.tip || 0);
    billTotalEl.textContent = (Math.round((total + Number.EPSILON) * 100) / 100).toFixed(2);
  }

  addLineBtn.addEventListener('click', function(){ addItem(true); });

  // ---------- Receipt scanning (Google Cloud Vision OCR) ----------
  // Key is restricted (Vision API only, this site's referrer only) in the
  // Google Cloud Console, so it's safe to sit in this public file.
  var GOOGLE_VISION_API_KEY = 'AIzaSyCbKp2htIzBJtzRdN4L7DvopSerOuWBX-k';

  var scanReceiptBtn = document.getElementById('scanReceiptBtn');
  var receiptPhotoInput = document.getElementById('receiptPhotoInput');
  var scanStatus = document.getElementById('scanStatus');

  function setScanStatus(msg, isError){
    scanStatus.textContent = msg;
    scanStatus.style.display = msg ? 'block' : 'none';
    scanStatus.classList.toggle('error', !!isError);
  }

  // Turns raw OCR text into a best-guess list of {name, price} lines.
  // Ignores quantity/unit-price columns by only ever taking the LAST price
  // found on a line (the line total), and skips obvious non-item lines
  // (subtotal, tax, card, change, etc).
  // Vision often detects an item's name and its price as two separate text
  // blocks (they're far apart horizontally), so the flattened full-text can
  // put a price on its own line with no name attached. This rebuilds rows
  // from the individual word boxes Vision also returns, grouping words that
  // sit at roughly the same height on the page — reuniting name + price
  // regardless of which text block Vision originally put them in.
  function reconstructRowsFromWords(textAnnotations){
    if(!textAnnotations || textAnnotations.length < 2) return null;

    var words = [];
    for(var i = 1; i < textAnnotations.length; i++){
      var t = textAnnotations[i];
      var poly = t.boundingPoly && t.boundingPoly.vertices;
      if(!poly || !poly.length) continue;
      var xs = poly.map(function(v){ return v.x || 0; });
      var ys = poly.map(function(v){ return v.y || 0; });
      words.push({
        text: t.description || '',
        x0: Math.min.apply(null, xs),
        y0: Math.min.apply(null, ys),
        y1: Math.max.apply(null, ys)
      });
    }
    if(!words.length) return null;

    words.sort(function(a, b){ return (a.y0 + a.y1) - (b.y0 + b.y1); });

    var rows = [];
    words.forEach(function(w){
      var yc = (w.y0 + w.y1) / 2;
      var h = (w.y1 - w.y0) || 10;
      var match = null;
      for(var j = 0; j < rows.length; j++){
        var r = rows[j];
        var rYc = (r.y0 + r.y1) / 2;
        var rH = (r.y1 - r.y0) || 10;
        if(Math.abs(yc - rYc) < Math.max(h, rH) * 0.6){ match = r; break; }
      }
      if(match){
        match.words.push(w);
        match.y0 = Math.min(match.y0, w.y0);
        match.y1 = Math.max(match.y1, w.y1);
      } else {
        rows.push({ y0: w.y0, y1: w.y1, words: [w] });
      }
    });

    rows.sort(function(a, b){ return a.y0 - b.y0; });
    return rows.map(function(r){
      r.words.sort(function(a, b){ return a.x0 - b.x0; });
      return r.words.map(function(w){ return w.text; }).join(' ');
    }).join('\n');
  }

  function parseReceiptText(text){
    var skipWords = /\b(sub ?total|total|tax|vat|change|cash|card|debit|credit|visa|mastercard|balance|amount due|due|tip|gratuity|service charge|payment|thank you|receipt|invoice|table|server|order\s*#?|date|time)\b/i;
    var priceRe = /\d+[.,]\d{2}/g;
    var results = [];

    text.split(/\r?\n/).forEach(function(rawLine){
      var line = rawLine.trim();
      if(!line) return;
      if(skipWords.test(line)) return;

      var matches = line.match(priceRe);
      if(!matches || matches.length === 0) return;

      var lastPriceStr = matches[matches.length - 1];
      var lastIndex = line.lastIndexOf(lastPriceStr);
      var priceNum = parseFloat(lastPriceStr.replace(',', '.'));
      if(isNaN(priceNum) || priceNum <= 0) return;

      var namePart = line.substring(0, lastIndex);
      namePart = namePart.replace(/[€£$]/g, '');
      namePart = namePart.replace(/^\s*\d+\s*[xX]\s*/, '');   // leading "2 x "
      namePart = namePart.replace(/^\s*\d+\s+/, '');          // leading "2 "
      namePart = namePart.replace(/[\s.\-x@]+$/i, '');        // trailing junk / unit price lead-ins
      namePart = namePart.replace(/\s{2,}/g, ' ').trim();

      if(!namePart) namePart = '(scanned item)';
      results.push({ name: namePart, price: priceNum });
    });

    return results;
  }

  function fileToBase64(file){
    return new Promise(function(resolve, reject){
      var reader = new FileReader();
      reader.onload = function(){
        var result = reader.result || '';
        var comma = result.indexOf(',');
        resolve(comma >= 0 ? result.substring(comma + 1) : result);
      };
      reader.onerror = function(){ reject(reader.error || new Error('Could not read the photo')); };
      reader.readAsDataURL(file);
    });
  }

  scanReceiptBtn.addEventListener('click', function(){
    receiptPhotoInput.click();
  });

  receiptPhotoInput.addEventListener('change', function(){
    var file = receiptPhotoInput.files && receiptPhotoInput.files[0];
    receiptPhotoInput.value = ''; // allow re-selecting the same file next time
    if(!file) return;

    scanReceiptBtn.disabled = true;
    addLineBtn.disabled = true;
    setScanStatus('Reading receipt…');

    fileToBase64(file).then(function(base64){
      return fetch('https://vision.googleapis.com/v1/images:annotate?key=' + GOOGLE_VISION_API_KEY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          requests: [{
            image: { content: base64 },
            features: [{ type: 'DOCUMENT_TEXT_DETECTION' }]
          }]
        })
      });
    }).then(function(resp){
      return resp.json();
    }).then(function(data){
      var result = data && data.responses && data.responses[0];
      if(result && result.error){
        throw new Error(result.error.message || 'Vision API error');
      }
      var text = reconstructRowsFromWords(result && result.textAnnotations)
        || (result && result.fullTextAnnotation && result.fullTextAnnotation.text)
        || '';
      var parsed = parseReceiptText(text);

      if(parsed.length === 0){
        setScanStatus("Couldn't find any items in that photo — try a clearer, flatter, well-lit shot, or add lines manually.", true);
        return;
      }

      // drop any fully-blank lines already on the page before appending scanned ones
      state.items = state.items.filter(function(it){
        return (it.name || '').trim().length > 0 || (it.price || 0) !== 0;
      });
      parsed.forEach(function(p){
        state.items.push({ id: state.nextItemId++, name: p.name, price: p.price });
      });

      renderItems();
      updateBillTotal();
      saveState();
      setScanStatus('Added ' + parsed.length + ' line' + (parsed.length === 1 ? '' : 's') + ' from the photo — please check each one against the receipt, OCR isn\'t perfect.');
    }).catch(function(err){
      console.error(err);
      var msg = (err && err.message) ? err.message : 'please try again.';
      setScanStatus('Something went wrong reading that photo: ' + msg, true);
    }).finally(function(){
      scanReceiptBtn.disabled = false;
      addLineBtn.disabled = false;
    });
  });

  var currencySelect = document.getElementById('currencySelect');
  currencySelect.addEventListener('change', function(){
    state.currency = currencySelect.value;
    saveState();
    renderItems();
    updateBillTotal();
    updateAddonSymbols();
  });

  var taxInput = document.getElementById('taxInput');
  var tipInput = document.getElementById('tipInput');
  var taxSym = document.getElementById('taxSym');
  var tipSym = document.getElementById('tipSym');

  function updateAddonSymbols(){
    var sym = (state.currency && state.currency !== 'none') ? state.currency : '';
    taxSym.textContent = sym;
    tipSym.textContent = sym;
  }

  taxInput.addEventListener('input', function(){
    state.tax = parseFloat(taxInput.value) || 0;
    updateBillTotal();
    saveState();
    if(state.step === 3){ renderApportionList(); }
  });
  tipInput.addEventListener('input', function(){
    state.tip = parseFloat(tipInput.value) || 0;
    updateBillTotal();
    saveState();
    if(state.step === 3){ renderApportionList(); }
  });

  // ---------- Screen 3: Apportion ----------
  var apportionList = document.getElementById('apportionList');
  var partyDock = document.getElementById('partyDock');
  var clearLineBtn = document.getElementById('clearLineBtn');

  function getShares(itemId){
    if(!state.shares[itemId]) state.shares[itemId] = {};
    return state.shares[itemId];
  }

  function totalShareCount(itemId){
    var s = getShares(itemId);
    return Object.keys(s).reduce(function(sum, pid){ return sum + s[pid]; }, 0);
  }

  // Each person's total from items alone (only items that have at least
  // one share assigned contribute; unassigned items are excluded).
  function computeItemPersonTotals(){
    var totals = {};
    state.people.forEach(function(p){ totals[p.id] = 0; });
    state.items.forEach(function(it){
      var shares = getShares(it.id);
      var shareTotal = totalShareCount(it.id);
      if(shareTotal === 0) return;
      state.people.forEach(function(p){
        var count = shares[p.id] || 0;
        if(count > 0){ totals[p.id] += (it.price || 0) * (count / shareTotal); }
      });
    });
    return totals;
  }

  // Adds each person's pro-rata share of tax + tip on top of their item
  // total, based on their proportion of whatever's been split so far.
  function computeFullTotals(){
    var itemTotals = computeItemPersonTotals();
    var sumAssigned = 0;
    state.people.forEach(function(p){ sumAssigned += (itemTotals[p.id] || 0); });
    var addon = (state.tax || 0) + (state.tip || 0);
    var full = {};
    state.people.forEach(function(p){
      var base = itemTotals[p.id] || 0;
      var ratio = sumAssigned > 0 ? (base / sumAssigned) : 0;
      full[p.id] = base + ratio * addon;
    });
    return full;
  }

  function renderPartyDock(){
    partyDock.innerHTML = '';
    state.people.forEach(function(p, idx){
      var btn = document.createElement('button');
      btn.className = 'party-btn';
      btn.style.background = colorForIndex(idx);
      btn.textContent = p.abbr;
      btn.addEventListener('click', function(){
        if(state.selectedItemId === null) return;
        var s = getShares(state.selectedItemId);
        s[p.id] = (s[p.id] || 0) + 1;
        saveState();
        renderApportionList();
      });
      partyDock.appendChild(btn);
    });
  }

  function renderApportionList(){
    var scrollPos = apportionList.scrollTop;
    apportionList.innerHTML = '';
    state.items.forEach(function(it){
      var line = document.createElement('div');
      line.className = 'bill-line' + (state.selectedItemId === it.id ? ' selected' : '');
      line.addEventListener('click', function(){
        state.selectedItemId = it.id;
        renderApportionList();
      });

      var top = document.createElement('div');
      top.className = 'top-row';
      var nm = document.createElement('div');
      nm.className = 'iname';
      nm.textContent = it.name || '(unnamed item)';
      var pr = document.createElement('div');
      pr.className = 'iprice';
      pr.textContent = fmt(it.price || 0);
      top.appendChild(nm);
      top.appendChild(pr);

      var bar = document.createElement('div');
      bar.className = 'bar';
      var breakdown = document.createElement('div');
      breakdown.className = 'breakdown-row';

      var shares = getShares(it.id);
      var totalShares = totalShareCount(it.id);
      var anyAssigned = false;

      if(totalShares > 0){
        state.people.forEach(function(p, idx){
          var count = shares[p.id] || 0;
          if(count > 0){
            anyAssigned = true;
            var widthPct = (count / totalShares * 100);
            var color = colorForIndex(idx);

            var seg = document.createElement('div');
            seg.className = 'seg';
            seg.style.background = color;
            seg.style.width = widthPct + '%';
            bar.appendChild(seg);

            var amt = (it.price || 0) * (count / totalShares);
            var bseg = document.createElement('div');
            bseg.className = 'bseg';
            bseg.style.width = widthPct + '%';
            bseg.textContent = p.abbr + ' ' + fmt(amt);
            breakdown.appendChild(bseg);
          }
        });
      }

      if(!anyAssigned){
        var bsegEmpty = document.createElement('div');
        bsegEmpty.className = 'bseg';
        bsegEmpty.style.width = '100%';
        bsegEmpty.textContent = 'Not assigned yet';
        breakdown.appendChild(bsegEmpty);
      }

      line.appendChild(top);
      line.appendChild(bar);
      line.appendChild(breakdown);
      apportionList.appendChild(line);
    });
    apportionList.scrollTop = scrollPos;
  }

  clearLineBtn.addEventListener('click', function(){
    if(state.selectedItemId === null) return;
    state.shares[state.selectedItemId] = {};
    saveState();
    renderApportionList();
  });

  // ---------- Screen 4: Summary ----------
  var summaryList = document.getElementById('summaryList');
  var summaryGrandTotal = document.getElementById('summaryGrandTotal');
  var warnArea = document.getElementById('warnArea');

  function renderSummary(){
    summaryList.innerHTML = '';
    warnArea.innerHTML = '';

    var unassigned = [];
    state.items.forEach(function(it){
      var totalShares = totalShareCount(it.id);
      if(totalShares === 0 && (it.name || it.price)){
        unassigned.push(it.name || '(unnamed item)');
      }
    });

    if(unassigned.length){
      var warn = document.createElement('div');
      warn.className = 'warn-banner';

      var heading = document.createElement('b');
      heading.textContent = "Some items aren't split yet";
      warn.appendChild(heading);

      unassigned.forEach(function(name){
        var itemLine = document.createElement('div');
        itemLine.className = 'warn-item';
        itemLine.textContent = name;
        warn.appendChild(itemLine);
      });

      var msg = document.createElement('div');
      msg.className = 'warn-msg';
      msg.textContent = "Go back to Split to assign them, or the totals below won't match the bill.";
      warn.appendChild(msg);

      warnArea.appendChild(warn);
    }

    var totals = computeFullTotals();
    var grand = 0;
    state.people.forEach(function(p, idx){
      grand += totals[p.id] || 0;
      var row = document.createElement('div');
      row.className = 'summary-row';
      var sw = document.createElement('div');
      sw.className = 'swatch';
      sw.style.background = colorForIndex(idx);
      sw.textContent = p.abbr;
      var nm = document.createElement('div');
      nm.className = 'pname';
      nm.textContent = p.name;
      var amt = document.createElement('div');
      amt.className = 'pamount';
      amt.textContent = fmt(totals[p.id] || 0);
      row.appendChild(sw);
      row.appendChild(nm);
      row.appendChild(amt);
      summaryList.appendChild(row);
    });

    var addon = (state.tax || 0) + (state.tip || 0);
    if(addon > 0){
      var addonParts = [];
      if(state.tax) addonParts.push('Tax ' + fmt(state.tax));
      if(state.tip) addonParts.push('Tip ' + fmt(state.tip));
      var addonLine = document.createElement('div');
      addonLine.className = 'addon-summary-line';
      addonLine.textContent = addonParts.join('  ·  ') + '  (split pro-rata above)';
      summaryList.appendChild(addonLine);
    }

    summaryGrandTotal.textContent = fmt(grand);
  }

  // ---------- Navigation ----------
  function goToStep(n){
    state.step = n;
    if(n === 2){
      if(state.items.length === 0){ addItem(true); }
    }
    if(n === 3){
      if(state.selectedItemId === null && state.items.length){
        state.selectedItemId = state.items[0].id;
      }
      renderPartyDock();
      renderApportionList();
    }
    if(n === 4){
      renderSummary();
    }
    saveState();
    renderStepTabs();
  }

  document.querySelectorAll('.step-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      goToStep(parseInt(tab.dataset.step, 10));
    });
  });

  document.getElementById('toStep2').addEventListener('click', function(){ goToStep(2); });
  document.getElementById('backTo1').addEventListener('click', function(){ goToStep(1); });
  document.getElementById('toStep3').addEventListener('click', function(){
    // drop lines that have neither a name nor an amount before moving on
    state.items = state.items.filter(function(it){
      var hasName = (it.name || '').trim().length > 0;
      var hasPrice = (it.price || 0) !== 0;
      if(!hasName && !hasPrice){
        delete state.shares[it.id];
        if(state.selectedItemId === it.id) state.selectedItemId = null;
        return false;
      }
      return true;
    });
    if(state.items.length === 0){ addItem(false); }
    renderItems();
    saveState();
    goToStep(3);
  });
  document.getElementById('backTo2').addEventListener('click', function(){ goToStep(2); });
  document.getElementById('toStep4').addEventListener('click', function(){ goToStep(4); });
  document.getElementById('backTo3').addEventListener('click', function(){ goToStep(3); });
  document.getElementById('newBillBtn').addEventListener('click', function(){
    if(!confirm('Start a new bill? This clears everyone and every item.')) return;
    state = JSON.parse(JSON.stringify(defaultState));
    saveState();
    init();
  });

  // ---------- Init ----------
  function init(){
    refreshAbbreviations();
    renderPeople();
    if(state.step === 2 && state.items.length === 0){ addItem(false); }
    renderItems();
    currencySelect.value = state.currency || '€';
    taxInput.value = state.tax ? state.tax : '';
    tipInput.value = state.tip ? state.tip : '';
    updateAddonSymbols();
    updateBillTotal();
    renderStepTabs();
    if(state.step === 3){ renderPartyDock(); renderApportionList(); }
    if(state.step === 4){ renderSummary(); }
  }

  init();
})();
</script>
